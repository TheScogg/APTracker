<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messaging — Mobile Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<style>
  :root {
    --bg: #0f1117; --bg2: #161b24; --bg3: #1e2535; --bg4: #252d3d;
    --border: rgba(255,255,255,0.08);
    --text: #e8eaf0; --text2: #8b95a8; --text3: #4e5769;
    --accent: #5b8af5; --blue: #3b82f6; --green: #34d399; --red: #f87171;
    --ios-blue: #007AFF; --ios-blue-dim: rgba(0,122,255,0.15);
    --bubble-sent: #007AFF; --bubble-recv: #1e2535;
    --radius-bubble: 18px;
    font-family: 'Nunito', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0c10;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* ── Outer stage ── */
  .stage {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 32px 40px;
    align-items: start; justify-items: center;
    transform-origin: top center;
    padding: 32px 24px;
  }

  /* ── Screen content inside the phone ── */
  .phone-screen {
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex; flex-direction: column;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  /* ── View labels ── */
  .view-label {
    color: rgba(255,255,255,0.25);
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; text-align: center;
    margin-top: 12px;
  }

  /* ── Conversation List view ── */
  .conv-header {
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .conv-title { font-size: 22px; font-weight: 800; color: var(--text); }
  .conv-new-btn {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--ios-blue); border: none; color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; line-height: 1;
  }
  .conv-tabs {
    display: flex; padding: 0 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .conv-tab {
    font-size: 12px; font-weight: 600; padding: 8px 12px 9px;
    color: var(--text3); background: none; border: none; cursor: pointer;
    border-bottom: 2px solid transparent; font-family: 'Nunito', sans-serif;
  }
  .conv-tab.active { color: var(--ios-blue); border-bottom-color: var(--ios-blue); }
  .conv-search {
    margin: 8px 12px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 7px 12px 7px 30px;
    color: var(--text3); font-size: 13px; font-family: 'Nunito', sans-serif;
    position: relative; display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  .conv-list { flex: 1; overflow-y: auto; }
  .conv-list::-webkit-scrollbar { display: none; }

  .conv-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .conv-row:hover { background: var(--bg3); }
  .conv-row.active { background: var(--ios-blue-dim); }
  .conv-row-info { flex: 1; min-width: 0; }
  .conv-row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
  .conv-row-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .conv-row-time { font-size: 10px; color: var(--text3); }
  .conv-row-preview { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-row-preview.unread { color: var(--text2); font-weight: 600; }
  .conv-unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ios-blue); flex-shrink: 0; }

  .avatar {
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .avatar-group {
    border-radius: 10px; display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; overflow: hidden; flex-shrink: 0;
  }
  .avatar-group-cell {
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: #fff;
  }

  /* ── Thread view ── */
  .thread-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .thread-back {
    color: var(--ios-blue); font-size: 22px; background: none; border: none;
    cursor: pointer; line-height: 1; padding: 0;
  }
  .thread-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .thread-sub { font-size: 10px; color: var(--text3); }

  .thread-messages {
    flex: 1; overflow-y: auto; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .thread-messages::-webkit-scrollbar { display: none; }

  .msg-row { display: flex; align-items: flex-end; gap: 6px; }
  .msg-row.sent { flex-direction: row-reverse; }
  .msg-bubble {
    padding: 8px 12px; border-radius: 18px;
    font-size: 13px; line-height: 1.45; max-width: 72%;
    word-break: break-word;
  }
  .msg-bubble.recv { background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 5px; }
  .msg-bubble.sent { background: var(--ios-blue); color: #fff; border-bottom-right-radius: 5px; }
  .msg-time { font-size: 9px; color: var(--text3); margin-top: 2px; display: flex; align-items: center; gap: 3px; }
  .msg-row.sent .msg-time { justify-content: flex-end; }
  .msg-read { color: var(--ios-blue); font-size: 10px; }
  .msg-sender-name { font-size: 9px; color: var(--text3); font-weight: 600; padding-left: 4px; margin-bottom: 2px; }

  .msg-reactions-row { display: flex; gap: 3px; margin-top: 3px; flex-wrap: wrap; }
  .msg-reaction-pill {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 1px 6px; font-size: 11px;
    display: flex; align-items: center; gap: 2px;
  }
  .msg-reaction-pill.mine { background: var(--ios-blue-dim); border-color: var(--ios-blue); }
  .msg-reaction-count { font-size: 9px; color: var(--text2); font-weight: 600; }

  .typing-bubble {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 18px; border-bottom-left-radius: 5px;
    padding: 10px 12px; display: flex; gap: 3px; align-items: center;
    width: fit-content;
  }
  .typing-dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--text3);
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }
  .date-sep {
    display: flex; align-items: center; gap: 6px;
    color: var(--text3); font-size: 9px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase; margin: 6px 0;
  }
  .date-sep::before, .date-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .thread-composer {
    border-top: 1px solid var(--border);
    padding: 8px 10px;
    display: flex; align-items: center; gap: 6px;
    background: var(--bg2); flex-shrink: 0;
  }
  .composer-input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 18px; padding: 8px 12px;
    color: var(--text3); font-size: 13px; font-family: 'Nunito', sans-serif;
  }
  .composer-send {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--ios-blue); border: none; color: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .composer-emoji {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg3); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }

  /* Toast */
  .toast {
    position: absolute; bottom: 80px; left: 12px; right: 12px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 12px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 100;
    animation: toastIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes toastIn { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .toast-name { font-size: 11px; font-weight: 700; color: var(--text); }
  .toast-msg { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* New message sheet */
  .new-sheet {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: flex-end;
    z-index: 50;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .new-sheet-inner {
    background: var(--bg2);
    border-radius: 18px 18px 0 0;
    width: 100%; padding: 16px 16px 32px;
    animation: sheetUp 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .sheet-handle { width: 32px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 12px; }
  .sheet-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .sheet-member {
    display: flex; align-items: center; gap: 8px;
    padding: 8px; border-radius: 10px; cursor: pointer;
    transition: background 0.1s;
  }
  .sheet-member:hover { background: var(--bg3); }
  .sheet-member.sel { background: var(--ios-blue-dim); }
  .sheet-member-name { font-size: 13px; font-weight: 600; }
  .sheet-check { margin-left: auto; width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; }
  .sheet-check.on { background: var(--ios-blue); border-color: var(--ios-blue); }
  .sheet-btn { width: 100%; padding: 11px; background: var(--ios-blue); color: #fff; border: none; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 12px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const COLORS = ['#007AFF','#34C759','#FF9500','#FF3B30','#AF52DE','#5AC8FA','#FF2D55','#00C7BE'];
const colorFor = s => COLORS[s.split('').reduce((a,c)=>a+c.charCodeAt(0),0) % COLORS.length];
const ini = n => n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const fmtTime = ts => { const d=new Date(ts),n=new Date(); return Math.floor((n-d)/86400000)===0?d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'Yesterday'; };

const USERS = [
  {id:'u1',name:'Alex Morgan'},{id:'u2',name:'Jordan Lee'},
  {id:'u3',name:'Sam Rivera'},{id:'u4',name:'Casey Kim'},{id:'u5',name:'Taylor Pham'},
];
const ME = {id:'me',name:'You'};
const t = Date.now();

const SEED = [
  { id:'c1',type:'dm',members:['me','u1'],name:'Alex Morgan',pinned:true,
    messages:[
      {id:'m1',sid:'u1',text:'Hey, the press on Row 3 is throwing alerts again',ts:t-3600000*3,reactions:{},readBy:['me','u1']},
      {id:'m2',sid:'me',text:'On it — going to check the sensor now',ts:t-3600000*3+60000,reactions:{'👍':['u1']},readBy:['me','u1']},
      {id:'m3',sid:'u1',text:'Thanks! Also the shift report is ready whenever you get a chance',ts:t-1800000,reactions:{},readBy:['u1']},
    ]},
  { id:'c2',type:'group',members:['me','u1','u2','u3'],name:'Maintenance Crew',pinned:false,
    messages:[
      {id:'m4',sid:'u2',text:'Morning everyone 👋 All machines nominal on 1st shift',ts:t-7200000,reactions:{'👋':['u1','me']},readBy:['me','u1','u2','u3']},
      {id:'m5',sid:'u3',text:'Row 2 had a brief jam but it cleared. Logged it.',ts:t-7000000,reactions:{},readBy:['me','u1','u2','u3']},
      {id:'m6',sid:'me',text:'Good work team. Keep the logs updated please',ts:t-6800000,reactions:{'✅':['u1','u2','u3']},readBy:['me','u1','u2','u3']},
    ]},
  { id:'c3',type:'dm',members:['me','u4'],name:'Casey Kim',pinned:false,
    messages:[
      {id:'m8',sid:'u4',text:'Do you have the part number for the feeder belt on Press 7?',ts:t-86400000,reactions:{},readBy:['me','u4']},
      {id:'m9',sid:'me',text:'PB-4472-C, it\'s in the parts cabinet drawer 3',ts:t-86400000+120000,reactions:{'🙏':['u4']},readBy:['me','u4']},
    ]},
  { id:'c4',type:'group',members:['me','u2','u5'],name:'Supervisors',pinned:false,
    messages:[
      {id:'m10',sid:'u5',text:'Reminder: safety walk at 2pm today',ts:t-172800000,reactions:{},readBy:['me','u2','u5']},
    ]},
];

function Av({user, size=38, sq=false}) {
  return (
    <div className="avatar" style={{width:size,height:size,borderRadius:sq?size*0.28:'50%',background:colorFor(user.id),fontSize:size*0.33,flexShrink:0}}>
      {ini(user.name)}
    </div>
  );
}
function GroupAv({members, size=38}) {
  const sh = members.filter(u=>u.id!=='me').slice(0,4);
  return (
    <div className="avatar-group" style={{width:size,height:size}}>
      {sh.map(u=><div key={u.id} className="avatar-group-cell" style={{background:colorFor(u.id),fontSize:size*0.18}}>{ini(u.name)}</div>)}
    </div>
  );
}

// ── SCREEN 1: Conversation List ───────────────────────────
function ConvoListScreen({convos, onSelect, onNew}) {
  const [tab, setTab] = useState('all');
  const list = convos.filter(c=> tab==='dms'?c.type==='dm': tab==='groups'?c.type==='group': tab==='pinned'?c.pinned: true)
    .sort((a,b)=> (a.pinned&&!b.pinned)?-1:(!a.pinned&&b.pinned)?1: (b.messages[b.messages.length-1]?.ts||0)-(a.messages[a.messages.length-1]?.ts||0));

  return (
    <div className="phone-screen">
      <IOSStatusBar dark={true} time="9:41"/>
      <div className="conv-header">
        <div className="conv-title">Messages</div>
        <button className="conv-new-btn" onClick={onNew}>+</button>
      </div>
      <div className="conv-tabs">
        {[['all','All'],['dms','DMs'],['groups','Groups'],['pinned','📌']].map(([k,l])=>(
          <button key={k} className={`conv-tab ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>
      <div className="conv-search" style={{margin:'8px 12px',display:'flex',alignItems:'center',gap:6,color:'var(--text3)',fontSize:13}}>
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" strokeWidth="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
        Search
      </div>
      <div className="conv-list">
        {list.map(c=>{
          const members = c.members.map(id=>id==='me'?ME:USERS.find(u=>u.id===id)).filter(Boolean);
          const other = members.find(u=>u.id!=='me')||ME;
          const last = c.messages[c.messages.length-1];
          const lSender = last ? (last.sid==='me'?'You':USERS.find(u=>u.id===last.sid)?.name?.split(' ')[0]||''):'';
          const preview = last ? `${lSender}: ${last.text}` : 'No messages yet';
          const unread = c.messages.filter(m=>m.sid!=='me'&&!(m.readBy||[]).includes('me')).length;
          return (
            <div key={c.id} className="conv-row" onClick={()=>onSelect(c.id)}>
              {c.type==='group' ? <GroupAv members={members} size={42}/> : <Av user={other} size={42}/>}
              <div className="conv-row-info">
                <div className="conv-row-top">
                  <span className="conv-row-name">{c.pinned?'📌 ':''}{c.name}</span>
                  {last && <span className="conv-row-time">{fmtTime(last.ts)}</span>}
                </div>
                <div className={`conv-row-preview ${unread>0?'unread':''}`}>{preview}</div>
              </div>
              {unread>0 && <div className="conv-unread-dot"/>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── SCREEN 2: Thread ──────────────────────────────────────
function ThreadScreen({convo, onBack}) {
  const [input, setInput] = useState('');
  const [messages, setMessages] = useState(convo.messages);
  const [typing, setTyping] = useState(false);
  const endRef = useRef();

  const members = convo.members.map(id=>id==='me'?ME:USERS.find(u=>u.id===id)).filter(Boolean);
  const others = members.filter(u=>u.id!=='me');

  useEffect(()=>{ endRef.current?.scrollIntoView({block:'nearest'}); },[messages.length]);
  useEffect(()=>{
    const t1=setTimeout(()=>setTyping(true),2500);
    const t2=setTimeout(()=>{
      setTyping(false);
      setMessages(p=>[...p,{id:'inc_'+Date.now(),sid:others[0]?.id,text:'Sounds good, I\'ll check it out now 👍',ts:Date.now(),reactions:{},readBy:[others[0]?.id]}]);
    },4500);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[]);

  const send = () => {
    if(!input.trim()) return;
    setMessages(p=>[...p,{id:'s_'+Date.now(),sid:'me',text:input.trim(),ts:Date.now(),reactions:{},readBy:['me']}]);
    setInput('');
  };

  // Group by date
  const rows = [];
  let curDate = null;
  messages.forEach(m=>{
    const d = new Date(m.ts).toDateString();
    if(d!==curDate){ rows.push({type:'sep',ts:m.ts}); curDate=d; }
    rows.push({type:'msg',m});
  });

  return (
    <div className="phone-screen">
      <IOSStatusBar dark={true} time="9:41"/>
      <div className="thread-header">
        <button className="thread-back" onClick={onBack}>‹</button>
        {convo.type==='group'?<GroupAv members={members} size={32}/>:<Av user={others[0]||ME} size={32}/>}
        <div style={{flex:1,minWidth:0}}>
          <div className="thread-name">{convo.name}</div>
          <div className="thread-sub">{convo.type==='group'?`${others.length+1} members`:others[0]?.name||''}</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style={{color:'var(--ios-blue)'}}><circle cx="6.5" cy="6.5" r="4.5" stroke="var(--ios-blue)" strokeWidth="1.4"/><path d="M10.5 10.5L14 14" stroke="var(--ios-blue)" strokeWidth="1.4" strokeLinecap="round"/></svg>
      </div>

      <div className="thread-messages">
        {rows.map((row,i)=>{
          if(row.type==='sep') return <div key={'s'+i} className="date-sep">{new Date(row.ts).toDateString()===new Date().toDateString()?'Today':'Yesterday'}</div>;
          const {m} = row;
          const isSent = m.sid==='me';
          const sender = USERS.find(u=>u.id===m.sid);
          const rxs = Object.entries(m.reactions||{}).filter(([,u])=>u.length>0);
          const isRead = m.readBy&&m.readBy.some(id=>id!=='me');
          return (
            <div key={m.id}>
              <div className={`msg-row ${isSent?'sent':'recv'}`}>
                {!isSent && <Av user={sender||ME} size={24}/>}
                <div style={{display:'flex',flexDirection:'column',alignItems:isSent?'flex-end':'flex-start',maxWidth:'72%'}}>
                  {!isSent && convo.type==='group' && <div className="msg-sender-name">{sender?.name?.split(' ')[0]}</div>}
                  <div className={`msg-bubble ${isSent?'sent':'recv'}`}>{m.text}</div>
                  {rxs.length>0 && (
                    <div className="msg-reactions-row">
                      {rxs.map(([e,u])=>(
                        <div key={e} className={`msg-reaction-pill ${u.includes('me')?'mine':''}`}>
                          {e}<span className="msg-reaction-count">{u.length>1?u.length:''}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  <div className="msg-time">
                    {new Date(m.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
                    {isSent && <span className="msg-read">{isRead?'✓✓':'✓'}</span>}
                  </div>
                </div>
              </div>
            </div>
          );
        })}
        {typing && (
          <div className="msg-row recv">
            <Av user={others[0]||ME} size={24}/>
            <div className="typing-bubble">
              <div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/>
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>

      <div className="thread-composer">
        <div className="composer-emoji">😊</div>
        <div className="composer-input" style={{flex:1,padding:'8px 12px',color:'var(--text3)',fontSize:13}}>
          {input || 'iMessage'}
        </div>
        <button className="composer-send" onClick={send}>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13.5 2.5L7 9M13.5 2.5L9 13.5 7 9l-4.5-2 9-4.5z" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
      </div>
      <IOSKeyboard dark={true}/>
    </div>
  );
}

// ── SCREEN 3: Toast notification ──────────────────────────
function ToastScreen() {
  const [show, setShow] = useState(false);
  useEffect(()=>{
    const t = setTimeout(()=>setShow(true),1500);
    const t2 = setTimeout(()=>setShow(false),4000);
    return()=>{clearTimeout(t);clearTimeout(t2);};
  },[]);
  const sender = USERS[1];
  return (
    <div className="phone-screen" style={{position:'relative'}}>
      <IOSStatusBar dark={true} time="9:41"/>
      {/* Blurred app in background */}
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,filter:'blur(3px)',opacity:0.4}}>
        <div style={{width:60,height:60,borderRadius:14,background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>⚙️</div>
        <div style={{fontSize:18,fontWeight:800,color:'var(--text)',letterSpacing:1}}>AP TRACKER</div>
        <div style={{fontSize:12,color:'var(--text3)'}}>Floor map loading…</div>
      </div>
      {/* Toast */}
      {show && (
        <div className="toast">
          <Av user={sender} size={34}/>
          <div style={{flex:1,minWidth:0}}>
            <div className="toast-name">{sender.name} · Messages</div>
            <div className="toast-msg">Quick heads up — hydraulics on P4 need checking</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── SCREEN 4: New message sheet ───────────────────────────
function NewMsgScreen() {
  const [sel, setSel] = useState('u3');
  return (
    <div className="phone-screen" style={{position:'relative'}}>
      <IOSStatusBar dark={true} time="9:41"/>
      <div style={{flex:1,background:'var(--bg)',opacity:0.6}}/>
      <div className="new-sheet-inner">
        <div className="sheet-handle"/>
        <div className="sheet-title">New Message</div>
        {USERS.map(u=>(
          <div key={u.id} className={`sheet-member ${sel===u.id?'sel':''}`} onClick={()=>setSel(u.id)}>
            <Av user={u} size={34}/>
            <span className="sheet-member-name">{u.name}</span>
            <div className={`sheet-check ${sel===u.id?'on':''}`}>{sel===u.id?'✓':''}</div>
          </div>
        ))}
        <button className="sheet-btn">Start Conversation</button>
      </div>
    </div>
  );
}

// ── Main app ──────────────────────────────────────────────
function App() {
  const [convos] = useState(SEED);
  const [activeId, setActiveId] = useState(null);

  const stageRef = useRef();
  useEffect(()=>{
    const scale = () => {
      const el = stageRef.current;
      if(!el) return;
      const vw = window.innerWidth, vh = window.innerHeight;
      const contentW = 700, contentH = 960;
      const s = Math.min(vw/contentW, vh/contentH, 1);
      el.style.transform = `scale(${s})`;
      el.style.transformOrigin = 'top center';
    };
    scale();
    window.addEventListener('resize', scale);
    return ()=>window.removeEventListener('resize', scale);
  },[]);

  const activeConvo = convos.find(c=>c.id===activeId);

  return (
    <div ref={stageRef} className="stage">
      {/* Phone 1: Conversation list */}
      <div>
        <IOSDevice dark={true}>
          <ConvoListScreen convos={convos} onSelect={setActiveId} onNew={()=>{}}/>
        </IOSDevice>
        <div className="view-label" style={{marginTop:16}}>Conversation List</div>
      </div>

      {/* Phone 2: Open thread */}
      <div>
        <IOSDevice dark={true}>
          <ThreadScreen convo={convos[1]} onBack={()=>{}}/>
        </IOSDevice>
        <div className="view-label" style={{marginTop:16}}>Open Thread</div>
      </div>

      {/* Phone 3: Toast alert */}
      <div>
        <IOSDevice dark={true}>
          <ToastScreen/>
        </IOSDevice>
        <div className="view-label" style={{marginTop:16}}>Incoming Alert</div>
      </div>

      {/* Phone 4: New message */}
      <div>
        <IOSDevice dark={true}>
          <NewMsgScreen/>
        </IOSDevice>
        <div className="view-label" style={{marginTop:16}}>New Message</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
